<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title></title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- 自定义标题栏 -->
    <div class="titlebar">
        <div class="titlebar-drag">
            <span class="title">端口管理器</span>
        </div>
        <div class="window-controls">
            <button class="window-btn minimize-btn" id="minimizeBtn" title="最小化">
                <svg width="12" height="12" viewBox="0 0 12 12">
                    <rect x="2" y="5.5" width="8" height="1" fill="currentColor"/>
                </svg>
            </button>
            <button class="window-btn maximize-btn" id="maximizeBtn" title="最大化">
                <svg width="12" height="12" viewBox="0 0 12 12">
                    <rect x="2" y="2" width="8" height="8" fill="none" stroke="currentColor" stroke-width="1"/>
                </svg>
            </button>
            <button class="window-btn close-btn" id="closeBtn" title="关闭">
                <svg width="12" height="12" viewBox="0 0 12 12">
                    <path d="M2 2 L10 10 M10 2 L2 10" stroke="currentColor" stroke-width="1.2"/>
                </svg>
            </button>
        </div>
    </div>

    <div class="container">
        <header>
            <div class="header-content">
                <h1>端口管理器</h1>
                <div class="header-actions">
                    <button id="refreshBtn" class="btn btn-icon" title="刷新">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M21 2v6h-6M3 12a9 9 0 0 1 15-6.7L21 8M3 22v-6h6M21 12a9 9 0 0 1-15 6.7L3 16"/>
                        </svg>
                    </button>
                    <button id="autoRefreshBtn" class="btn btn-icon" title="自动刷新">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <circle cx="12" cy="12" r="10"/>
                            <path d="M12 6v6l4 2"/>
                        </svg>
                    </button>
                </div>
            </div>
            <span id="lastUpdate" class="last-update"></span>
        </header>

        <div class="stats">
            <div class="stat-card">
                <div class="stat-icon">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M22 12h-4l-3 9L9 3l-3 9H2"/>
                    </svg>
                </div>
                <div class="stat-info">
                    <div class="stat-value" id="totalPorts">0</div>
                    <div class="stat-label">占用端口</div>
                </div>
            </div>
            <div class="stat-card">
                <div class="stat-icon">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <rect x="2" y="3" width="20" height="14" rx="2" ry="2"/>
                        <line x1="8" y1="21" x2="16" y2="21"/>
                        <line x1="12" y1="17" x2="12" y2="21"/>
                    </svg>
                </div>
                <div class="stat-info">
                    <div class="stat-value" id="totalProcesses">0</div>
                    <div class="stat-label">运行进程</div>
                </div>
            </div>
        </div>

        <div class="search-box">
            <svg class="search-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <circle cx="11" cy="11" r="8"/>
                <path d="m21 21-4.35-4.35"/>
            </svg>
            <input type="text" id="searchInput" placeholder="搜索端口或进程...">
        </div>

        <div class="port-list" id="portList">
            <div class="loading">
                <div class="spinner"></div>
                <span>正在加载...</span>
            </div>
        </div>
    </div>

    <!-- 确认对话框 -->
    <div id="confirmDialog" class="modal hidden">
        <div class="modal-backdrop"></div>
        <div class="modal-content">
            <div class="modal-header">
                <h3>确认操作</h3>
                <button class="modal-close" id="modalCloseBtn">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M18 6L6 18M6 6l12 12"/>
                    </svg>
                </button>
            </div>
            <div class="modal-body">
                <div class="confirm-icon">
                    <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/>
                        <line x1="12" y1="9" x2="12" y2="13"/>
                        <line x1="12" y1="17" x2="12.01" y2="17"/>
                    </svg>
                </div>
                <p class="confirm-text">确定要关闭端口 <strong id="confirmPort"></strong> 吗？</p>
                <div class="confirm-details">
                    <div class="detail-item">
                        <span>PID:</span>
                        <strong id="confirmPid"></strong>
                    </div>
                    <div class="detail-item">
                        <span>进程:</span>
                        <strong id="confirmProcess"></strong>
                    </div>
                </div>
                <div id="systemWarning" class="system-warning hidden">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M12 9v4M12 17h.01M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/>
                    </svg>
                    <span>这是一个<strong>系统进程</strong>，关闭可能导致系统不稳定！</span>
                </div>
                <p class="warning">此操作将强制终止该进程！</p>
            </div>
            <div class="modal-actions">
                <button id="cancelBtn" class="btn btn-cancel">取消</button>
                <button id="confirmKillBtn" class="btn btn-danger">确认关闭</button>
            </div>
        </div>
    </div>

    <!-- 提示消息 -->
    <div id="toast" class="toast hidden"></div>

    <script src="app.js"></script>
</body>
</html>
